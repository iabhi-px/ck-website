# Default values for ck-website.
# Your developer will override these for staging/prod.

replicaCount: 2

image:
  # Replace with your AWS ECR repo, e.g.
  #   123456789.dkr.ecr.us-east-1.amazonaws.com/ck-website
  repository: ck-website
  tag: "latest"
  pullPolicy: IfNotPresent

imagePullSecrets: []

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: true
  className: alb        # AWS Load Balancer Controller. Use "nginx" if using nginx-ingress.
  annotations: {}
  #   kubernetes.io/ingress.class: alb
  #   alb.ingress.kubernetes.io/scheme: internet-facing
  #   alb.ingress.kubernetes.io/target-type: ip
  #   alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
  #   alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:...
  hosts:
    - host: codekarma.ai
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #   - hosts:
  #       - codekarma.ai
  #     secretName: codekarma-ai-tls

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

probes:
  liveness:
    path: /healthz
    initialDelaySeconds: 5
    periodSeconds: 10
  readiness:
    path: /healthz
    initialDelaySeconds: 2
    periodSeconds: 5

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 101         # nginx user in the official image
  fsGroup: 101

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

nodeSelector: {}
tolerations: []
affinity: {}
