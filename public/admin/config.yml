local_backend: true

backend:
  name: github
  repo: iabhi-px/ck-website
  branch: main

media_folder: public/assets/uploads
public_folder: /assets/uploads

collections:
  - name: blog
    label: Blog
    folder: src/content/blog
    create: true
    extension: mdx
    format: frontmatter
    slug: "{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Description, name: description, widget: text }
      - { label: Publish Date, name: publishedAt, widget: datetime }
      - { label: Cover Image, name: coverImage, widget: image, required: false }
      - label: Tags
        name: tags
        widget: list
        field: { label: Tag, name: tag, widget: string }
      - { label: Draft, name: draft, widget: boolean, default: false }
      - { label: Body, name: body, widget: markdown }

  - name: case-studies
    label: Case Studies
    folder: src/content/case-studies
    create: true
    extension: mdx
    format: frontmatter
    slug: "{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Description, name: description, widget: text }
      - { label: Industry, name: industry, widget: string }
      - { label: Cover Image, name: coverImage, widget: image, required: false }
      - label: Metrics
        name: metrics
        widget: list
        fields:
          - { label: Value, name: value, widget: string }
          - { label: Label, name: label, widget: string }
      - { label: Draft, name: draft, widget: boolean, default: false }
      - { label: Body, name: body, widget: markdown }
