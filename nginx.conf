server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve static assets with long cache lifetimes
    location ~* \.(js|css|woff2?|ttf|eot|otf|svg|png|jpg|jpeg|gif|webp|avif|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # HTML pages: short cache so updates roll out quickly
    location / {
        add_header Cache-Control "public, max-age=60";
        try_files $uri $uri/ $uri.html $uri/index.html =404;
    }

    # Astro generates a 404.html — serve it for unknown routes
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # Healthcheck endpoint for Kubernetes probes
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
